version: 2
updates:
  # Rust dependencies
  - package-ecosystem: "cargo"
    directory: "/CrawlCipher.Terminal"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "deps(rust)"

  # Smart Contract dependencies
  - package-ecosystem: "cargo"
    directory: "/smart-contracts/session-lock"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "rust"
      - "smart-contract"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
